name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel an in-flight run when a branch is pushed again.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build and test on Linux and macOS with the race detector on. gofmt and vet
  # run here too so a formatting slip fails fast on both platforms. bento is pure
  # Go with no cgo and no browser, so nothing extra needs installing first.
  #
  # This job runs -short, which skips the AOT tests that shell out to `go run` to
  # build a generated program and the ones that spin the JavaScript engine to
  # evaluate the reference. Those two paths are the whole cost of the pkg/lower
  # suite (a few hundred toolchain links and engine spins), so leaving them off
  # keeps the pull-request signal fast. The behavioral equivalence they prove runs
  # in the equivalence job below, after merge, and every developer runs the full
  # suite locally before pushing.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt -s -w:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test -short -race -count=1 -coverprofile=coverage.out ./...
      - name: coverage summary
        if: matrix.os == 'ubuntu-latest'
        run: go tool cover -func=coverage.out | tail -1

  # The full behavioral equivalence proof: the AOT tests that compile the
  # generated Go and run it, and the ones that evaluate the reference TypeScript in
  # the JavaScript engine, both compared to prove the two agree. This is the slow
  # path the test job above skips, so it runs after merge on main rather than on
  # every pull request. The generated programs are content-addressed in a cache
  # keyed on the value runtime, so a run only rebuilds the fixtures whose behavior
  # could have moved; when pkg/value is unchanged the whole suite is a cache hit.
  equivalence:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: restore AOT test cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bento-aot-testcache
          key: bento-aot-testcache-${{ runner.os }}-${{ hashFiles('pkg/value/**/*.go', 'go.mod') }}
          restore-keys: |
            bento-aot-testcache-${{ runner.os }}-
      - name: equivalence
        run: go test -count=1 ./pkg/lower/ ./pkg/frontend/...

  # golangci-lint bundles staticcheck, govet, ineffassign, errcheck, unused and
  # more, so it is the main quality gate.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: latest

  # Scan the module and its dependencies for known vulnerabilities.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # Confirm go.mod and go.sum are tidy: a PR that adds an import without running
  # go mod tidy fails here instead of breaking a later release.
  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  # Prove the zero-cgo cross-compile story: bento is pure Go with a pure-Go JS
  # engine, so it should build for every target GoReleaser ships with
  # CGO_ENABLED=0 and no per-OS toolchain. A change that pulls in cgo (or code
  # that only builds on one OS) fails here instead of at release time.
  cross:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: freebsd, goarch: amd64 }
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "0"
        run: go build -o /dev/null ./cmd/bento
